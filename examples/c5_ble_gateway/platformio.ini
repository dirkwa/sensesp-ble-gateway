; SensESP BLE gateway on Waveshare ESP32-C5-WIFI6-KIT-NXRX.
;
; Uses NimBLE (lighter on RAM than Bluedroid) with WiFi.
; Control WebSocket disabled to save internal SRAM.

[platformio]
default_envs = c5_ble_gateway

[env:c5_ble_gateway]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = espidf, arduino

board = esp32-c5-devkitc-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = c5_partitions.csv

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -Werror=reorder

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D USE_ESP_IDF_LOG
    -DBOARD_HAS_PSRAM
    -D GATEWAY_HOSTNAME='"signalk-c5-ble-gw"'

lib_ldf_mode = deep

lib_deps =
    SignalK/SensESP@>=3.0.0
    symlink://../../
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413
