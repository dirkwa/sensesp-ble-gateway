; SensESP BLE gateway on Waveshare ESP32-P4-WIFI6-POE-ETH.
;
; Uses Bluedroid + esp_hosted VHCI to route BLE through the onboard
; ESP32-C6 companion. RMII Ethernet for network connectivity.

[platformio]
default_envs = p4_ble_gateway

[env:p4_ble_gateway]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = espidf, arduino

board = esp32-p4
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = p4_16mb.csv

upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags = -Werror=reorder

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D USE_ESP_IDF_LOG
    -D SENSESP_SSL_SUPPORT=1
    -DBOARD_HAS_PSRAM
    -D GATEWAY_HOSTNAME='"signalk-ble-gw"'

lib_ldf_mode = deep

lib_deps =
    ; Use fork until get_auth_token() is merged upstream (PR #951)
    https://github.com/dirkwa/SensESP.git#feat/skwsclient-get-auth-token
    symlink://../../
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413
