name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pio-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [p4_ble_gateway, c5_ble_gateway]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache PlatformIO + pip
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ matrix.example }}-${{ hashFiles(format('examples/{0}/platformio.ini', matrix.example)) }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.example }}-
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.example }}
        run: pio run -d examples/${{ matrix.example }}
